[General]
network = CAPIOnlyScenario
sim-time-limit = 30s
debug-on-errors = true
print-undisposed = true
cmdenv-express-mode = true
cmdenv-autoflush = true

**.scalar-recording = false
**.vector-recording = false

*.capi.address = "tcp://127.0.0.1:5555"
*.capi.receiveTimeout = 1000
*.capi.sendTimeout = 1000
*.capi.handlerType = "ZmqCAPIConnectionHandler"
*.capi.updateInterval = 1s

*.dealer.address = "tcp://127.0.0.1:5555"
*.dealer.registryModule = "^.registry"
*.dealer.startDelay = 0.1s
*.dealer.sendInterval = 0.5s
*.dealer.receiveTimeout = 100
*.dealer.sendTimeout = 1000

*.registry.firstOrder = 1
*.registry.minEntities = 1
*.registry.maxEntities = 5
