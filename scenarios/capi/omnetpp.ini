[General]
network = artery.inet.World

cmdenv-express-mode = false
cmdenv-output-file = ".cmdenv-log"

*.withCAPI = true
*.capi.cmdenv-log-level = debug
*.node[*].middleware.CosimService.cmdenv-log-level = debug

**.cmdenv-log-level = warn

**.scalar-recording = false
**.vector-recording = false

*.traci.core.version = -1
*.traci.launcher.typename = "ConnectLauncher"
*.traci.launcher.hostname = "sumo"
*.traci.launcher.port = 3000
*.traci.launcher.clientId = 1

*.capi.address = "tcp://*:7777"

*.node[*].wlan[*].typename = "VanetNic"
*.node[*].wlan[*].radio.channelNumber = 180
*.node[*].wlan[*].radio.carrierFrequency = 5.9 GHz
*.node[*].wlan[*].radio.transmitter.power = 200 mW

*.node[*].middleware.updateInterval = 0.1s
*.node[*].middleware.datetime = "2013-06-01 12:35:00"
*.node[*].middleware.services = xmldoc("services.xml")

# Masquerade is an attack that consists of swapping effective ID for some other valid ID
# from other CAV or RSU. Strategy's include:
# 1) first - get the first valid from some other random arriving transmission and set it
# for the rest of the scenario as effective
# 2) Swap - attacker swap id constantly as new transmissions arrive. A bit harder to detect,
# as IDs change a lot.
# 3) Random - save all IDs and choose randomly next effective ID.
[Config masquerade]

*.node[*].middleware.Masquerade.cmdenv-log-level = debug
*.node[*].middleware.services = xmldoc("masquerade/services.xml")
# Can set "first", "swap", "random"
*.node[*].middleware.Masquerade.masqueradeStrategy = "first"

# Flooding is an attack that simulates overloaded receiver by dropping incoming
# cosim payloads. Strategy's include:
# 1) random - drop each incoming payload with configured probability.
# 2) periods - randomly alternate clear and flooded periods; all payloads are
# dropped during flooded periods.
[Config flooding]

*.node[*].middleware.Flooding.cmdenv-log-level = debug
*.node[*].middleware.services = xmldoc("flooding/services.xml")
# Can set "random", "periods"
*.node[*].middleware.Flooding.floodingStrategy = "random"
*.node[*].middleware.Flooding.dropProbability = 0.25
*.node[*].middleware.Flooding.clearPeriodMean = 1s
*.node[*].middleware.Flooding.floodedPeriodMean = 0.2s

# Replay is an attack that retransmits stale cosim payloads instead of current
# state. Strategy's include:
# 1) first - capture the first valid foreign payload and send it forever.
# 2) repeat - keep captured payloads and replay each one replayCount times before
# switching to the next captured payload.
[Config replay]

*.node[*].middleware.Replay.cmdenv-log-level = debug
*.node[*].middleware.services = xmldoc("replay/services.xml")
# Can set "first", "repeat"
*.node[*].middleware.Replay.replayStrategy = "first"
*.node[*].middleware.Replay.replayCount = 3

# Spamming is an attack that increases transmission count per service tick.
# One transmission uses the current payload; the rest use randomly selected
# stale payloads captured from other CAVs/RSUs.
[Config spamming]

*.node[*].middleware.Spamming.cmdenv-log-level = debug
*.node[*].middleware.services = xmldoc("spamming/services.xml")
*.node[*].middleware.Spamming.burstCount = 5

[Config gemv2]

*.radioMedium.pathLossType = "Gemv2"
*.radioMedium.pathLoss.withSmallScaleVariations = false
*.radioMedium.pathLoss.withVisualization = true
