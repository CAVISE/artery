[General]
network = artery.inet.World

sim-time-limit = 600s
debug-on-errors = true

cmdenv-express-mode = false
cmdenv-event-banners = false
cmdenv-autoflush = true

cmdenv-output-file = ".cmdenv-log"
**.cmdenv-log-level = debug

**.scalar-recording = false
**.vector-recording = false

*.withCAPI = false
*.withPhysicalEnvironment = true

*.traci.core.version = -1
*.traci.launcher.typename = "PosixLauncher"
*.traci.launcher.sumo = "sumo-gui"
*.traci.launcher.sumocfg = "limassol.sumocfg"
*.traci.nodes.typename = "BasicNodeManager"

*.node[*].wlan[*].typename = "VanetNic"
*.node[*].wlan[*].radio.channelNumber = 180
*.node[*].wlan[*].radio.carrierFrequency = 5.9 GHz
*.node[*].wlan[*].radio.transmitter.power = 200 mW

*.node[*].middleware.updateInterval = 0.1s
*.node[*].middleware.datetime = "2013-06-01 12:35:00"
*.node[*].middleware.services = xmldoc("services.xml")

*.physicalEnvironment.typename = "cavise.sionna.environment.SionnaPhysicalEnvironment"
*.physicalEnvironment.sceneConfigProviderType = "cavise.sionna.environment.config.scenes.FileSceneConfigProvider"
*.physicalEnvironment.dynamicSceneConfigProviderType = "cavise.sionna.environment.config.TraciDynamicSceneConfigProvider"
*.physicalEnvironment.meshRegistryType = "cavise.sionna.environment.config.meshes.SionnaDirectAssetMeshRegistry"
*.physicalEnvironment.sceneVisualizerType = "cavise.sionna.environment.visualization.SionnaSceneVisualizer"

# Placeholder for the Mitsuba/Sionna scene file matching the Limassol SUMO map.
*.physicalEnvironment.sceneConfigProvider.scenePath = "limassol-scene.xml"
*.physicalEnvironment.sceneConfigProvider.mergeMeshes = true
*.physicalEnvironment.sceneConfigProvider.mergeEquivalent = true
*.physicalEnvironment.dynamicSceneConfigProvider.traciNodeManagerModule = "^.^.traci.nodes"
*.physicalEnvironment.dynamicSceneConfigProvider.meshRegistryModule = "^.meshRegistry"
*.physicalEnvironment.sceneVisualizer.renderInterval = 1s
*.physicalEnvironment.sceneVisualizer.camera = "limassol_overview"
*.physicalEnvironment.sceneVisualizer.cameraConfig = xmldoc("cameras.xml")
*.physicalEnvironment.sceneVisualizer.outputDir = "results/limassol"
*.physicalEnvironment.sceneVisualizer.spp = 64
*.physicalEnvironment.sceneVisualizer.width = 1280
*.physicalEnvironment.sceneVisualizer.height = 720
