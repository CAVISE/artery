name: Release Pipeline

on:
  pull_request:
    types: [closed]
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-slim
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Component Release Action
        uses: CAVISE/pipelines/.github/actions/component-release@main
        with:
          pr_title: ${{ github.event.pull_request.title }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
